<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · Gaël Aglin</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/img/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#fbf9f4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .nf { min-height: 100dvh; display: grid; place-items: center; text-align: left; }
    .nf .wrap { display: grid; gap: 1.5rem; max-width: 40rem; }
    .nf .code { font-family: var(--mono); font-size: var(--fs-mono); color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
    .nf h1 { font-size: clamp(3rem, 1.5rem + 7vw, 7rem); letter-spacing: -0.04em; line-height: 0.95; }
    .nf h1 span { color: var(--accent); }
    .nf p { color: var(--ink-soft); font-size: var(--fs-lead); max-width: 36ch; }
  </style>
</head>
<body>
  <div class="grid-field" aria-hidden="true"></div>
  <main class="nf">
    <div class="wrap">
      <span class="code">↳ Error 404 · no optimal path found</span>
      <h1>Off the<br />decision tree<span>.</span></h1>
      <p>This page does not exist, but the root node still does.</p>
      <div>
        <a class="btn" href="/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M14 6 8 12l6 6"/></svg>
          Back to home
        </a>
      </div>
    </div>
  </main>
</body>
</html>
